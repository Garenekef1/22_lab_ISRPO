<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator">
    <input id="display" type="text" readonly>
    <div class="buttons">
      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button>/</button>

      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button>*</button>

      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button>-</button>

      <button>C</button>
      <button>0</button>
      <button>.</button>
      <button>+</button>

      <button class="equal">=</button>
    </div>
  </div>
  <p class="hint">Кнопки созданы вручную по условию шага 2</p>
  <script type="module" src="main.js"></script>
</body>
</html>
